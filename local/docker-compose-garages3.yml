networks:
  internal:

services:
  db:
    image: postgres:16
    restart: always
    volumes:
      - ./volumes/postgres/data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-SECRET_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-nextcloud}
      - POSTGRES_USER=${POSTGRES_USER:-nextcloud}
    networks:
      - internal

  garage:
    image: dxflrs/garage:v1.0.0
    restart: unless-stopped
    volumes:
      - ./garage/garage.toml:/etc/garage.toml
      - ./garage/meta:/var/lib/garage/meta
      - ./garage/data:/var/lib/garage/data
    networks:
      - internal

  app:
    image: nextcloud:${NEXTCLOUD_VERSION:-stable-apache}
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./.docker/app/conf.d/php.ini:/usr/local/etc/php/conf.d/custom-php.ini
      - ./volumes/nextcloud:/var/www/html
      - ../volumes/nextcloud/config/s3.config.php:/var/www/html/config/s3.config.php:ro
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-nextcloud}
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-SECRET_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER:-nextcloud}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD:-admin}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS:-localhost,127.0.0.1,localhost:8080,127.0.0.1:8080}
      - OBJECTSTORE_S3_BUCKET=${GARAGES3_BUCKET:-nextcloud}
      - OBJECTSTORE_S3_REGION=${GARAGES3_REGION:-garage}
      - OBJECTSTORE_S3_HOST=${GARAGES3_HOSTNAME:-garage}
      - OBJECTSTORE_S3_PORT=${GARAGES3_PORT:-3900}
      - OBJECTSTORE_S3_SSL=${GARAGES3_USE_SSL:-false}
      - OBJECTSTORE_S3_USEPATH_STYLE=${GARAGES3_USE_PATH_STYLE:-true}
      - OBJECTSTORE_S3_AUTOCREATE=${GARAGES3_AUTOCREATE:-true}
      - OBJECTSTORE_S3_KEY=${GARAGES3_KEY_ID:-${GARAGES3_KEY:-}}
      - OBJECTSTORE_S3_SECRET=${GARAGES3_SECRET:-}
    depends_on:
      - db
      - garage
    networks:
      - internal

  cron:
    image: nextcloud:${NEXTCLOUD_VERSION:-stable-apache}
    restart: unless-stopped
    volumes:
      - ./.docker/app/conf.d/php.ini:/usr/local/etc/php/conf.d/custom-php.ini
      - ./volumes/nextcloud:/var/www/html
      - ../volumes/nextcloud/config/s3.config.php:/var/www/html/config/s3.config.php:ro
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-nextcloud}
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-SECRET_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER:-nextcloud}
      - OBJECTSTORE_S3_BUCKET=${GARAGES3_BUCKET:-nextcloud}
      - OBJECTSTORE_S3_REGION=${GARAGES3_REGION:-garage}
      - OBJECTSTORE_S3_HOST=${GARAGES3_HOSTNAME:-garage}
      - OBJECTSTORE_S3_PORT=${GARAGES3_PORT:-3900}
      - OBJECTSTORE_S3_SSL=${GARAGES3_USE_SSL:-false}
      - OBJECTSTORE_S3_USEPATH_STYLE=${GARAGES3_USE_PATH_STYLE:-true}
      - OBJECTSTORE_S3_AUTOCREATE=${GARAGES3_AUTOCREATE:-true}
      - OBJECTSTORE_S3_KEY=${GARAGES3_KEY_ID:-${GARAGES3_KEY:-}}
      - OBJECTSTORE_S3_SECRET=${GARAGES3_SECRET:-}
    entrypoint: /cron.sh
    depends_on:
      - db
      - garage
    networks:
      - internal
